  .warn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--red);opacity:0;transition:.3s}

  /* tier rail */
  .tiers{position:fixed;left:30px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:10px}
  .tier-btn{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:14px 18px 14px 15px;cursor:pointer;backdrop-filter:blur(10px);transition:.16s;text-align:left;min-width:208px}
  .tier-btn:hover{border-color:var(--line)}
  .tier-btn .n{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mut);flex:0 0 auto}
  .tier-btn .tt{font-size:15px;font-weight:600;color:var(--ink)}
  .tier-btn .td{font-size:11px;color:var(--mut);margin-top:2px}
  .tier-btn.on{border-color:var(--accent);background:rgba(34,211,238,.1)}
  body.war .tier-btn.on{background:rgba(255,90,60,.1)}

  /* caption */
  .caption{position:fixed;right:30px;bottom:96px;z-index:10;max-width:380px;background:var(--panel);border:1px solid var(--line);
    border-left:2px solid var(--accent);border-radius:13px;padding:20px 22px;backdrop-filter:blur(12px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .caption h3{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .caption p{font-size:13.5px;line-height:1.55;color:var(--mut);margin-top:9px;text-wrap:pretty}
  #cap-note{margin-top:13px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:var(--accent);
    border-top:1px solid var(--line);padding-top:11px}

  .dock{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:11;display:flex;gap:8px;padding:8px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(12px)}
  .dbtn{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;
    color:var(--mut);background:transparent;border:1px solid transparent;border-radius:9px;padding:11px 15px;cursor:pointer;text-decoration:none;transition:.15s}
  .dbtn:hover{color:var(--ink);background:rgba(34,211,238,.06)}

  .nav{position:fixed;right:30px;bottom:26px;z-index:11;display:flex;gap:10px}

  .hint{position:fixed;left:50%;top:96px;transform:translateX(-50%);z-index:7;font-family:'JetBrains Mono',monospace;font-size:10px;

  @media (max-width:880px){.caption{max-width:280px;right:14px;bottom:88px}.tier-btn{min-width:0}.tier-btn .td{display:none}.hint{display:none}}

  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ===== vesper-model.js =====
// vesper-model.js
// Procedural Three.js model of the VESPER bee-sized stealth satellite micro-drone.
// Returns a group plus metadata: rotors (for spin), part groups (for exploded view),
// and anchor points (Object3D) used to position HTML hotspot labels.

function createVesper(THREE_NS) {
  const T = THREE_NS || THREE;

  // ---- shared materials -------------------------------------------------
  const carbon = new T.MeshStandardMaterial({
    color: 0x12161b, metalness: 0.72, roughness: 0.42, flatShading: true,
  });
  const carbonDark = new T.MeshStandardMaterial({
    color: 0x0b0e12, metalness: 0.65, roughness: 0.55, flatShading: true,
  });
  const panel = new T.MeshStandardMaterial({
    color: 0x1b2128, metalness: 0.8, roughness: 0.32, flatShading: true,
  });
  const accent = new T.MeshStandardMaterial({
    color: 0x06141a, emissive: 0x22d3ee, emissiveIntensity: 2.4, metalness: 0.2, roughness: 0.4,
  });
  const accentDim = new T.MeshStandardMaterial({
    color: 0x06141a, emissive: 0x22d3ee, emissiveIntensity: 1.1, metalness: 0.3, roughness: 0.5,
  });
  // real honeybee amber/gold for the abdomen banding
  const beeStripe = new T.MeshStandardMaterial({
    color: 0x1c0f02, emissive: 0xffb240, emissiveIntensity: 1.9, metalness: 0.3, roughness: 0.45,
  });
  const glass = new T.MeshPhysicalMaterial({
    color: 0x0a1418, metalness: 0.1, roughness: 0.08, transmission: 0.6,
    transparent: true, opacity: 0.9, emissive: 0x22d3ee, emissiveIntensity: 0.6,
    clearcoat: 1, clearcoatRoughness: 0.1,
  });
  const blur = new T.MeshBasicMaterial({
    color: 0x9fe9f5, transparent: true, opacity: 0.0, side: T.DoubleSide, depthWrite: false,
  });

  // translucent insect-wing texture (membrane + veins) drawn on a canvas
  function wingTexture() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 130;
    const x = c.getContext('2d');
    const grad = x.createLinearGradient(0, 0, 256, 0);
    grad.addColorStop(0, 'rgba(190,245,255,0.55)');
    grad.addColorStop(0.6, 'rgba(120,215,235,0.22)');
    grad.addColorStop(1, 'rgba(90,195,220,0.05)');
    const shape = () => {
      x.beginPath();
      x.moveTo(8, 65);
      x.bezierCurveTo(55, 8, 205, 16, 248, 56);
      x.bezierCurveTo(254, 66, 232, 116, 150, 122);
      x.bezierCurveTo(70, 124, 20, 100, 8, 65);
      x.closePath();
    };
    shape(); x.fillStyle = grad; x.fill();
    // membrane cell veins
    x.strokeStyle = 'rgba(130,215,235,0.7)'; x.lineWidth = 1.6;
    const tips = [[245, 56], [240, 82], [215, 110], [150, 120], [90, 116]];
    tips.forEach((p) => { x.beginPath(); x.moveTo(14, 66); x.quadraticCurveTo(110, 60, p[0], p[1]); x.stroke(); });
    // cross-struts (mechanical lattice)
    x.strokeStyle = 'rgba(110,200,222,0.45)'; x.lineWidth = 1;
    for (let i = 1; i < 5; i++) { const xx = 40 + i * 42; x.beginPath(); x.moveTo(xx, 30); x.lineTo(xx - 8, 110); x.stroke(); }
    // bright leading-edge spar
    x.strokeStyle = 'rgba(180,240,255,0.95)'; x.lineWidth = 4; x.beginPath(); x.moveTo(12, 62); x.lineTo(192, 48); x.stroke();
    shape(); x.strokeStyle = 'rgba(160,235,255,0.8)'; x.lineWidth = 2.4; x.stroke();
    const tex = new T.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
  }
  const wingMat = new T.MeshBasicMaterial({
    map: wingTexture(), transparent: true, side: T.DoubleSide, depthWrite: false, opacity: 0.92,
  });

  const root = new T.Group();
  root.name = 'vesper';

  const parts = {};        // named part groups, each with .userData.explodeOffset
  const anchors = {};      // named Object3D anchor points for hotspots
  const rotors = [];       // { pivot, blurMesh }

  function mkPart(name, offset) {
    const g = new T.Group();
    g.name = name;
    g.userData.explodeOffset = offset || new T.Vector3();
    g.userData.basePos = g.position.clone();
    parts[name] = g;
    root.add(g);
    return g;
  }

  // ---- THORAX (central airframe) ---------------------------------------
  const thorax = mkPart('airframe', new T.Vector3(0, 0, 0));
  {
    const core = new T.Mesh(new T.IcosahedronGeometry(0.92, 1), carbon);
    core.scale.set(1.35, 0.92, 1.05);
    core.castShadow = true; core.receiveShadow = true;
    thorax.add(core);

    // dorsal armored panel
    const dorsal = new T.Mesh(new T.IcosahedronGeometry(0.78, 1), panel);
    dorsal.scale.set(1.15, 0.55, 0.9);
    dorsal.position.set(0.0, 0.42, 0);
    thorax.add(dorsal);

    // 360° omnidirectional vision dome — clear sphere ringed with lenses
    const dome = new T.Mesh(new T.SphereGeometry(0.24, 24, 18), glass);
    dome.position.set(0.05, 0.74, 0);
    thorax.add(dome);
    const domeCore = new T.Mesh(new T.SphereGeometry(0.13, 16, 12), accentDim);
    domeCore.position.set(0.05, 0.74, 0); thorax.add(domeCore);
    for (let i = 0; i < 8; i++) {
      const a2 = (i / 8) * Math.PI * 2;
      const lens = new T.Mesh(new T.SphereGeometry(0.045, 10, 8), accent);
      lens.position.set(0.05 + Math.cos(a2) * 0.22, 0.74, Math.sin(a2) * 0.22);
      thorax.add(lens);
    }
    const av = new T.Object3D(); av.position.set(0.05, 1.0, 0.0); thorax.add(av); anchors.vision360 = av;

    // acoustic / mic array — recessed ring of ports on the dorsal deck
    const mic = new T.Mesh(new T.TorusGeometry(0.34, 0.03, 8, 28), accentDim);
    mic.rotation.x = Math.PI / 2;
    mic.position.set(-0.35, 0.58, 0);
    thorax.add(mic);
    const am = new T.Object3D(); am.position.set(-0.45, 0.7, 0.3); thorax.add(am); anchors.acoustic = am;

    // cyan accent vent slits on the sides
    for (const s of [1, -1]) {
      for (let i = 0; i < 3; i++) {
        const slit = new T.Mesh(new T.BoxGeometry(0.42, 0.045, 0.04), accentDim);
        slit.position.set(0.1 - i * 0.34, 0.05, s * 0.78);
        slit.rotation.y = s * 0.1;
        thorax.add(slit);
      }
    }
    const a = new T.Object3D(); a.position.set(0.4, 0.5, 0.6); thorax.add(a); anchors.airframe = a;
  }

  // ---- HEAD + compound optical sensors ---------------------------------
  const head = mkPart('sensor', new T.Vector3(2.0, 0.4, 0));
  head.position.set(1.18, -0.02, 0);
  head.userData.basePos = head.position.clone();
  {
    const skull = new T.Mesh(new T.IcosahedronGeometry(0.54, 1), carbonDark);
    skull.scale.set(1.05, 1.0, 1.2);
    skull.castShadow = true;
    head.add(skull);

    // large bee-like compound-eye sensor domes (night-vision optics)
    for (const s of [1, -1]) {
      const eye = new T.Mesh(new T.SphereGeometry(0.32, 22, 18, 0, Math.PI * 2, 0, Math.PI * 0.62), glass);
      eye.rotation.z = -Math.PI / 2 - 0.42;
      eye.rotation.y = s * 0.55;
      eye.position.set(0.22, 0.08, s * 0.34);
      head.add(eye);
      const iris = new T.Mesh(new T.SphereGeometry(0.12, 16, 12), accent);
      iris.position.set(0.4, 0.1, s * 0.36);
      head.add(iris);
    }
    // chin gimbal — thermal / heatmap imager
    const gimbal = new T.Mesh(new T.SphereGeometry(0.17, 18, 14), accentDim);
    gimbal.position.set(0.36, -0.3, 0);
    head.add(gimbal);
    const gimbalEye = new T.Mesh(new T.SphereGeometry(0.08, 14, 10), accent);
    gimbalEye.position.set(0.5, -0.3, 0); head.add(gimbalEye);

    // bee antennae — thin curved feelers with glowing tips
    for (const s of [1, -1]) {
      const ant = new T.Group();
      const seg1 = new T.Mesh(new T.CylinderGeometry(0.018, 0.026, 0.34, 6), carbonDark);
      seg1.position.set(0.0, 0.17, 0); ant.add(seg1);
      const seg2 = new T.Mesh(new T.CylinderGeometry(0.012, 0.018, 0.32, 6), carbonDark);
      seg2.position.set(0.12, 0.46, 0); seg2.rotation.z = -0.7; ant.add(seg2);
      const tip = new T.Mesh(new T.SphereGeometry(0.04, 10, 8), accent);
      tip.position.set(0.33, 0.58, 0); ant.add(tip);
      ant.position.set(0.3, 0.3, s * 0.16);
      ant.rotation.x = s * 0.35;
      head.add(ant);
    }

    const a = new T.Object3D(); a.position.set(0.5, 0.3, 0.42); head.add(a); anchors.sensor = a;
    const tn = new T.Object3D(); tn.position.set(0.55, -0.32, 0.0); head.add(tn); anchors.thermal = tn;
  }

  // ---- ABDOMEN (battery + bee stripes) ---------------------------------
  const abdomen = mkPart('power', new T.Vector3(-2.1, -0.1, 0));
  abdomen.position.set(-1.35, -0.05, 0);
  abdomen.userData.basePos = abdomen.position.clone();
  {
    const seg = new T.Mesh(new T.IcosahedronGeometry(0.74, 1), carbon);
    seg.scale.set(1.75, 0.86, 0.86);
    seg.position.x = -0.2;
    seg.castShadow = true;
    abdomen.add(seg);

    // glowing bee stripes — bolder & more segments
    const stripeN = 5;
    for (let i = 0; i < stripeN; i++) {
      const f = i / (stripeN - 1);
      const rad = 0.66 - f * 0.34;
      const ring = new T.Mesh(new T.TorusGeometry(rad, 0.06, 10, 30), beeStripe);
      ring.rotation.y = Math.PI / 2;
      ring.position.x = 0.28 - i * 0.4;
      ring.scale.set(1, 0.84, 1);
      abdomen.add(ring);
      // dark segment groove just behind each stripe
      const groove = new T.Mesh(new T.TorusGeometry(rad + 0.02, 0.085, 10, 30), carbonDark);
      groove.rotation.y = Math.PI / 2;
      groove.position.x = 0.28 - i * 0.4 - 0.16;
      groove.scale.set(1, 0.84, 1);
      abdomen.add(groove);
    }
    // stinger / rear thruster
    const stinger = new T.Mesh(new T.ConeGeometry(0.12, 0.6, 8), panel);
    stinger.rotation.z = Math.PI / 2;
    stinger.position.x = -1.4;
    abdomen.add(stinger);
    const stingTip = new T.Mesh(new T.SphereGeometry(0.06, 10, 8), accent);
    stingTip.position.x = -1.7; abdomen.add(stingTip);

    const a = new T.Object3D(); a.position.set(-0.3, -0.4, 0.45); abdomen.add(a); anchors.power = a;
  }

  // ---- internal SATCOM core (revealed in exploded view) ----------------
  const core = mkPart('core', new T.Vector3(0, 2.3, 0));
  {
    const cube = new T.Mesh(new T.BoxGeometry(0.5, 0.42, 0.5), panel);
    core.add(cube);
    const edges = new T.Mesh(new T.BoxGeometry(0.54, 0.12, 0.54), accent);
    edges.position.y = 0.0; core.add(edges);
    const a = new T.Object3D(); a.position.set(0.0, 0.35, 0.35); core.add(a); anchors.core = a;
  }

  // ---- ANTENNA (SATCOM phased array) -----------------------------------
  const antenna = mkPart('uplink', new T.Vector3(0.4, 2.6, -0.6));
  antenna.position.set(-0.55, 0.55, 0);
  antenna.userData.basePos = antenna.position.clone();
  {
    const mast = new T.Mesh(new T.CylinderGeometry(0.035, 0.06, 1.5, 8), panel);
    mast.position.set(0, 0.7, 0);
    mast.rotation.z = 0.22;
    antenna.add(mast);
    // flat phased-array dish at the tip
    const dish = new T.Mesh(new T.CylinderGeometry(0.34, 0.34, 0.06, 6), panel);
    dish.position.set(-0.32, 1.42, 0);
    dish.rotation.set(0, 0, -0.5);
    antenna.add(dish);
    const dishFace = new T.Mesh(new T.CircleGeometry(0.3, 6), accentDim);
    dishFace.position.set(-0.3, 1.45, 0);
    dishFace.rotation.set(0, Math.PI / 2, 1.07);
    antenna.add(dishFace);
    const beacon = new T.Mesh(new T.SphereGeometry(0.07, 12, 10), accent);
    beacon.position.set(-0.3, 1.46, 0);
    antenna.add(beacon);
    anchors.uplinkBeacon = beacon;
    const a = new T.Object3D(); a.position.set(-0.5, 1.6, 0.4); antenna.add(a); anchors.uplink = a;
  }

  // ---- ARMS + DUCTED ROTORS (×4) ---------------------------------------
  const rotorGroup = mkPart('rotors', new T.Vector3(0, 1.4, 0));
  const armDefs = [
    { x: 0.85, z: 0.95 }, { x: 0.85, z: -0.95 },
    { x: -0.7, z: 0.95 }, { x: -0.7, z: -0.95 },
  ];
  armDefs.forEach((d, idx) => {
    const tip = new T.Vector3(d.x * 1.7, 0.62, d.z * 1.55);
    // arm strut from thorax to rotor
    const from = new T.Vector3(d.x * 0.4, 0.2, d.z * 0.45);
    const dir = new T.Vector3().subVectors(tip, from);
    const len = dir.length();
    const arm = new T.Mesh(new T.CylinderGeometry(0.06, 0.09, len, 8), carbonDark);
    arm.position.copy(from.clone().add(tip).multiplyScalar(0.5));
    arm.quaternion.setFromUnitVectors(new T.Vector3(0, 1, 0), dir.clone().normalize());
    arm.castShadow = true;
    rotorGroup.add(arm);

    // ducted ring
    const duct = new T.Mesh(new T.TorusGeometry(0.6, 0.07, 12, 36), panel);
    duct.position.copy(tip);
    duct.rotation.x = Math.PI / 2;
    duct.castShadow = true;
    rotorGroup.add(duct);
    const ductGlow = new T.Mesh(new T.TorusGeometry(0.6, 0.022, 8, 36), accentDim);
    ductGlow.position.copy(tip).add(new T.Vector3(0, -0.04, 0));
    ductGlow.rotation.x = Math.PI / 2;
    rotorGroup.add(ductGlow);

    // spinning rotor assembly
    const pivot = new T.Group();
    pivot.position.copy(tip);
    const hub = new T.Mesh(new T.CylinderGeometry(0.1, 0.13, 0.14, 10), panel);
    pivot.add(hub);
    for (let b = 0; b < 3; b++) {
      const blade = new T.Mesh(new T.BoxGeometry(1.0, 0.02, 0.14), carbonDark);
      blade.position.set(0, 0.02, 0);
      blade.rotation.y = (b / 3) * Math.PI * 2;
      blade.geometry.translate(0.5, 0, 0);
      pivot.add(blade);
    }
    const blurMesh = new T.Mesh(new T.CircleGeometry(0.56, 40), blur.clone());
    blurMesh.rotation.x = -Math.PI / 2;
    blurMesh.position.y = 0.03;
    pivot.add(blurMesh);
    rotorGroup.add(pivot);
    rotors.push({ pivot, blurMesh, dir: idx % 2 === 0 ? 1 : -1 });

    if (idx === 0) {
      const a = new T.Object3D(); a.position.copy(tip).add(new T.Vector3(0.2, 0.35, 0.2));
      rotorGroup.add(a); anchors.rotors = a;
    }
  });

  // ---- BEE WINGS (two translucent pairs) -------------------------------
  const wings = mkPart('wings', new T.Vector3(0, 1.0, 0));
  const wingList = [];
  function makeWing(len, wid, mount, s, sweep, lift) {
    const pivot = new T.Group();
    pivot.position.set(mount[0], mount[1], mount[2] * s);
    const geo = new T.PlaneGeometry(len, wid, 1, 1);
    geo.translate(len / 2, 0, 0);
    const m = new T.Mesh(geo, wingMat);
    m.rotation.x = -Math.PI / 2;       // lie flat (membrane faces up)
    pivot.add(m);
    // mechanical carbon leading-edge spar + root hinge
    const spar = new T.Mesh(new T.CylinderGeometry(0.024, 0.012, len, 6), carbonDark);
    spar.rotation.z = Math.PI / 2; spar.position.set(len / 2, 0, wid * 0.4);
    pivot.add(spar);
    const hinge = new T.Mesh(new T.CylinderGeometry(0.055, 0.055, 0.13, 10), panel);
    hinge.rotation.x = Math.PI / 2; pivot.add(hinge);
    pivot.rotation.y = s * sweep;       // sweep back & outward
    pivot.rotation.x = s * lift;        // resting dihedral
    pivot.userData.base = { x: pivot.rotation.x, side: s };
    wings.add(pivot);
    wingList.push(pivot);
  }
  // forewings (large) + hindwings (smaller), per side — raised & swept back
  for (const s of [1, -1]) {
    makeWing(1.7, 0.6, [0.1, 0.95, 0.1], s, 2.5, 0.62);
    makeWing(1.15, 0.42, [-0.2, 0.86, 0.08], s, 2.78, 0.5);
  }
  const aw = new T.Object3D(); aw.position.set(-0.7, 1.5, 1.1); wings.add(aw); anchors.wings = aw;

  // ---- LANDING STRUTS --------------------------------------------------
  const legs = mkPart('gear', new T.Vector3(0, -2.0, 0));
  [[0.7, 0.6], [0.7, -0.6], [-0.7, 0.6], [-0.7, -0.6]].forEach(([x, z]) => {
    const leg = new T.Mesh(new T.CylinderGeometry(0.04, 0.025, 0.85, 6), carbonDark);
    leg.position.set(x, -0.55, z);
    leg.rotation.set(z * 0.35, 0, -x * 0.35);
    legs.add(leg);
    const foot = new T.Mesh(new T.SphereGeometry(0.05, 8, 6), panel);
    foot.position.set(x * 1.28, -0.92, z * 1.28);
    legs.add(foot);
  });

  // store base positions for explode
  Object.values(parts).forEach((p) => { p.userData.basePos = p.position.clone(); });

  // ---- public api ------------------------------------------------------
  function setExplode(t) {
    Object.values(parts).forEach((p) => {
      const base = p.userData.basePos;
      const off = p.userData.explodeOffset;
      p.position.set(base.x + off.x * t, base.y + off.y * t, base.z + off.z * t);
    });
  }
  function spinRotors(dt, throttle) {
    rotors.forEach((r) => {
      r.pivot.rotation.y += r.dir * dt * 26 * throttle;
      const targetOpacity = Math.min(0.34, throttle * 0.34);
      r.blurMesh.material.opacity += (targetOpacity - r.blurMesh.material.opacity) * 0.08;
    });
  }
  function flutterWings(t, amp) {
    wingList.forEach((w, i) => {
      const b = w.userData.base;
      const flap = Math.sin(t * 26 + i * 0.4) * amp;
      w.rotation.x = b.x + b.side * flap;
    });
  }

  root.scale.setScalar(0.85);
  return { group: root, parts, anchors, rotors, wings: wingList, setExplode, spinRotors, flutterWings };
}


// ===== vesper-fleet.js =====
// vesper-fleet.js — Tier-02 Mother Ship & Tier-03 Grandmother Ship 3D models.
// Procedural Three.js. Each builder returns { group, anchors, animate(t) }.

function mats(T) {
  return {
    carbon: new T.MeshStandardMaterial({ color: 0x10161c, metalness: 0.7, roughness: 0.45, flatShading: true }),
    dark: new T.MeshStandardMaterial({ color: 0x080c10, metalness: 0.6, roughness: 0.6, flatShading: true }),
    panel: new T.MeshStandardMaterial({ color: 0x1a2229, metalness: 0.82, roughness: 0.3, flatShading: true }),
    hull: new T.MeshStandardMaterial({ color: 0x141b22, metalness: 0.72, roughness: 0.4 }),
    door: new T.MeshStandardMaterial({ color: 0x222c36, metalness: 0.74, roughness: 0.38 }),
    cyan: new T.MeshStandardMaterial({ color: 0x06141a, emissive: 0x22d3ee, emissiveIntensity: 2.2, roughness: 0.4 }),
    cyanDim: new T.MeshStandardMaterial({ color: 0x06141a, emissive: 0x22d3ee, emissiveIntensity: 1.0, roughness: 0.5 }),
    amber: new T.MeshStandardMaterial({ color: 0x1c0f02, emissive: 0xffb240, emissiveIntensity: 2.0, roughness: 0.45 }),
    solar: new T.MeshStandardMaterial({ color: 0x0a2230, metalness: 0.8, roughness: 0.35, emissive: 0x0a3a47, emissiveIntensity: 0.4 }),
    glass: new T.MeshPhysicalMaterial({ color: 0x0a1418, metalness: 0.1, roughness: 0.1, transmission: 0.5, transparent: true, opacity: 0.85, emissive: 0x22d3ee, emissiveIntensity: 0.5 }),
  };
}

function beeProxy(T, M) {
  const g = new T.Group();
  const body = new T.Mesh(new T.IcosahedronGeometry(0.18, 0), M.carbon); body.scale.set(1.7, 0.7, 0.85); g.add(body);
  [[0.2, 0.16], [0.2, -0.16], [-0.16, 0.16], [-0.16, -0.16]].forEach(([x, z]) => {
    const ring = new T.Mesh(new T.TorusGeometry(0.11, 0.018, 6, 14), M.panel);
    ring.rotation.x = Math.PI / 2; ring.position.set(x, 0.05, z); g.add(ring);
  });
  const st = new T.Mesh(new T.TorusGeometry(0.1, 0.02, 6, 12), M.amber); st.rotation.y = Math.PI / 2; st.position.set(-0.08, 0.02, 0); g.add(st);
  const eye = new T.Mesh(new T.SphereGeometry(0.05, 8, 6), M.cyan); eye.position.set(0.28, 0.04, 0); g.add(eye);
  return g;
}

function deltaWing(T, M, len, span, thick) {
  const s = new T.Shape();
  s.moveTo(0, 0); s.lineTo(len, -span * 0.12); s.lineTo(len * 0.4, -span); s.lineTo(0, -span * 0.86); s.closePath();
  const g = new T.ExtrudeGeometry(s, { depth: thick, bevelEnabled: false });
  g.center();
  return new T.Mesh(g, M.panel);
}
function tpsMat(T) {
  return new T.MeshStandardMaterial({ color: 0x2a1810, metalness: 0.2, roughness: 0.88, emissive: 0x5a1e08, emissiveIntensity: 0.35 });
}

// Build a honeycomb of HEXAGONAL bay doors (no sharp corners = no stress risers).
// Returns refs for the single open bay so the caller can animate the door + interior.
function buildHexHangar(T, M, parent, opts) {
  const { cellR, deckY, openX = 0, openZ = 0 } = opts;
  const ox = openX, oz = openZ;
  // single recessed bay only — the hull stays smooth (no honeycomb field of hatches)
  const well = new T.Mesh(new T.CylinderGeometry(cellR * 0.92, cellR * 0.86, 0.55, 6), M.dark); well.rotation.y = Math.PI / 6; well.position.set(ox, deckY - 0.26, oz); parent.add(well);
  const litFloor = new T.Mesh(new T.CylinderGeometry(cellR * 0.8, cellR * 0.8, 0.02, 6), M.cyanDim); litFloor.rotation.y = Math.PI / 6; litFloor.position.set(ox, deckY - 0.5, oz); parent.add(litFloor);
  const coam = new T.Mesh(new T.TorusGeometry(cellR * 0.92, 0.03, 6, 6), M.cyanDim); coam.rotation.set(Math.PI / 2, 0, Math.PI / 6); coam.position.set(ox, deckY + 0.04, oz); parent.add(coam);
  const inner = new T.Group(); parent.add(inner);
  const door = new T.Mesh(new T.CylinderGeometry(cellR * 0.98, cellR * 0.98, 0.06, 6), M.panel); door.rotation.y = Math.PI / 6; door.position.set(ox, deckY + 0.04, oz); parent.add(door);
  for (let k = -1; k <= 1; k++) { const sm = new T.Mesh(new T.BoxGeometry(0.02, 0.07, cellR), M.dark); sm.position.set(k * cellR * 0.4, 0.005, 0); door.add(sm); }
  return { ox, oz, well, litFloor, inner, door, coam, cellR, deckY };
}

// ───────────────────────────── MOTHER SHIP ─────────────────────────────
function createMother(T = THREE) {
  const M = mats(T);
  const root = new T.Group();
  const anchors = {};
  const A = (name, x, y, z) => { const o = new T.Object3D(); o.position.set(x, y, z); root.add(o); anchors[name] = o; };

  // ── lifting-body fuselage — credible atmosphere→orbit airframe ──
  const tps = tpsMat(T);
  const body = new T.Mesh(new T.SphereGeometry(1.5, 40, 26), M.hull);
  body.scale.set(2.7, 0.58, 1.32); body.position.x = -0.3; body.castShadow = true; body.receiveShadow = true; root.add(body);
  // long ogive nose (sharp, for hypersonic entry)
  const nose = new T.Mesh(new T.ConeGeometry(0.95, 3.8, 40), M.hull); nose.rotation.z = -Math.PI / 2; nose.scale.set(1, 0.58, 1.32); nose.position.set(3.1, 0.0, 0); nose.castShadow = true; root.add(nose);
  const noseTip = new T.Mesh(new T.SphereGeometry(0.07, 8, 6), tps); noseTip.position.set(4.95, 0, 0); root.add(noseTip);
  // ablative heat-shield belly (lower hemisphere)
  const belly = new T.Mesh(new T.SphereGeometry(1.56, 26, 14, 0, Math.PI * 2, Math.PI * 0.5, Math.PI * 0.5), tps);
  belly.scale.set(2.7, 0.7, 1.36); belly.position.set(-0.3, 0.0, 0); root.add(belly);
  A('shield', -0.3, -0.9, 1.2);

  // recharge spine (glowing)
  const spine = new T.Mesh(new T.BoxGeometry(6.4, 0.05, 0.12), M.cyan); spine.position.set(0, 0.92, 0); root.add(spine);

  // bridge / AGI cockpit at front
  const bridge = new T.Mesh(new T.CylinderGeometry(0.55, 0.7, 0.5, 6), M.panel); bridge.position.set(3.1, 1.05, 0); root.add(bridge);
  const brWin = new T.Mesh(new T.TorusGeometry(0.45, 0.06, 6, 18, Math.PI), M.amber); brWin.position.set(3.3, 1.05, 0); brWin.rotation.set(Math.PI / 2, 0, -0.2); root.add(brWin);
  A('bridge', 3.1, 1.7, 0.6);

  // conformal phased-array comms — flush to the hull (no protruding mast/dome to shear off)
  const comms = new T.Mesh(new T.CylinderGeometry(0.38, 0.38, 0.04, 6), M.door); comms.rotation.set(Math.PI / 2, 0, Math.PI / 6); comms.position.set(1.85, 0.82, 0); root.add(comms);
  const commsFace = new T.Mesh(new T.CylinderGeometry(0.28, 0.28, 0.02, 6), M.cyanDim); commsFace.rotation.set(Math.PI / 2, 0, Math.PI / 6); commsFace.position.set(1.85, 0.845, 0); root.add(commsFace);

  // ── swept delta wings + compact deployable solar + canted tail fins ──
  [1, -1].forEach((s) => {
    const w = deltaWing(T, M, 4.2, 2.9, 0.12);
    w.rotation.x = -Math.PI / 2; w.scale.set(1, 1, s);
    w.position.set(-1.5, -0.18, s * 1.0); w.castShadow = true; root.add(w);
    const le = new T.Mesh(new T.BoxGeometry(3.0, 0.05, 0.06), M.cyanDim);
    le.position.set(0.1, -0.05, s * 2.0); le.rotation.y = -s * 0.46; root.add(le);
    for (let c = 0; c < 4; c++) { const p = new T.Mesh(new T.BoxGeometry(0.46, 0.03, 0.66), M.solar); p.position.set(-1.4 - c * 0.5, 0.02, s * 1.5); root.add(p); }
  });
  A('aerowing', -0.6, 0.1, 2.7);
  [1, -1].forEach((s) => {
    const f = deltaWing(T, M, 1.5, 1.15, 0.08); f.scale.set(1, -1, 1);
    f.position.set(-3.0, 0.25, s * 0.55); f.rotation.x = s * 0.55; root.add(f);
  });

  // docking-bay honeycomb on top deck + docked bees
  // ── DORSAL HANGAR — honeycomb of HEXAGONAL bay doors (bees sealed inside) ──
  const bays = new T.Group(); root.add(bays);
  let chargeBee = null, chargeArm = null, chargeGlow = null, dockBee = null;
  const deckY = 0.9;
  const H = buildHexHangar(T, M, bays, { cellR: 0.4, deckY, xLim: 2.35, zLim: 1.15, xShift: -0.75, openX: -0.4, openZ: 0 });
  const hx = H.ox, hz = H.oz, floorY = deckY - 0.5;
  // craft parked INSIDE the open bay (hidden when the hex door is sealed)
  const innerCraft = H.inner;
  [[hx - 0.16, hz + 0.12], [hx + 0.14, hz - 0.12]].forEach(([bx, bz]) => { const b = beeProxy(T, M); b.scale.setScalar(0.4); b.position.set(bx, floorY + 0.12, bz); b.rotation.y = Math.random() * 0.6; innerCraft.add(b); });
  chargeBee = beeProxy(T, M); chargeBee.scale.setScalar(0.44); chargeBee.position.set(hx + 0.02, floorY + 0.12, hz - 0.02); innerCraft.add(chargeBee);
  chargeGlow = new T.Mesh(new T.TorusGeometry(0.13, 0.02, 8, 18), M.amber); chargeGlow.rotation.x = Math.PI / 2; chargeGlow.position.set(hx + 0.02, floorY + 0.02, hz - 0.02); innerCraft.add(chargeGlow);
  // one bee being recovered THROUGH the open bay
  dockBee = beeProxy(T, M); dockBee.scale.setScalar(0.42); bays.add(dockBee);
  A('charge', hx, deckY + 0.5, hz + 0.3);
  A('bays', hx, deckY + 0.7, hz - 0.2);
  bays.userData = { dockBee, door: H.door, inner: innerCraft, well: H.well, litFloor: H.litFloor, hx, hz, floorY, deckY, cellR: H.cellR };
  A('solar', -1.9, 0.25, 1.7);

  // ── SPACE-VEHICLE SYSTEMS ──
  const engineGlow = [];
  const egMat = () => new T.MeshBasicMaterial({ color: 0x6ad8ff, transparent: true, opacity: 0.9, blending: T.AdditiveBlending, depthWrite: false, fog: false });
  [-0.75, 0, 0.75].forEach((z) => {
    const noz = new T.Mesh(new T.CylinderGeometry(0.22, 0.34, 0.55, 14), M.panel); noz.rotation.z = Math.PI / 2; noz.position.set(-4.45, 0.1, z); root.add(noz);
    const ring = new T.Mesh(new T.TorusGeometry(0.26, 0.02, 6, 16), M.cyan); ring.rotation.y = Math.PI / 2; ring.position.set(-4.7, 0.1, z); root.add(ring);
    const g = new T.Mesh(new T.CircleGeometry(0.22, 18), egMat()); g.position.set(-4.72, 0.1, z); g.rotation.y = -Math.PI / 2; root.add(g); engineGlow.push(g);
  });
  A('engine', -4.7, 0.9, 0);
  // thermal radiators — CONFORMAL hex-lozenge panels flush to the hull (no protruding slabs)
  [1, -1].forEach((s) => {
    const rad = new T.Mesh(new T.CylinderGeometry(0.5, 0.5, 0.03, 6), new T.MeshStandardMaterial({ color: 0x141b20, metalness: 0.6, roughness: 0.5, emissive: 0x200a06, emissiveIntensity: 0.3 }));
    rad.rotation.set(Math.PI / 2, 0, Math.PI / 6); rad.scale.set(3.1, 1, 1); rad.position.set(-0.9, -0.62, s * 0.82); root.add(rad);
    for (let i = 0; i < 4; i++) { const f = new T.Mesh(new T.BoxGeometry(2.7, 0.035, 0.015), M.dark); f.position.set(-0.9, -0.6, s * 0.82 - 0.18 + i * 0.12); root.add(f); }
  });
  A('radiator', -0.9, -0.7, 1.0);
  // RCS attitude thruster quads at corners
  [[3.8, 0.9, 0.9], [3.8, 0.9, -0.9], [-3.5, 0.9, 0.9], [-3.5, 0.9, -0.9]].forEach((p) => {
    const pod = new T.Mesh(new T.BoxGeometry(0.18, 0.18, 0.18), M.panel); pod.position.set(...p); root.add(pod);
    const j = new T.Mesh(new T.CylinderGeometry(0.03, 0.05, 0.1, 6), M.cyanDim); j.position.set(p[0], p[1] + 0.14, p[2]); root.add(j);
  });
  A('rcs', 3.8, 1.3, 0.9);
  A('comms', 1.85, 1.05, 0.3);

  // ── WAR-CLASS kit — weapon turrets + afterburners (hidden in Public class) ──
  const warKit = new T.Group(); warKit.visible = false; root.add(warKit);
  const redMat = new T.MeshStandardMaterial({ color: 0x1a0606, emissive: 0xff3b2f, emissiveIntensity: 1.9, metalness: 0.5, roughness: 0.4 });
  [[0.7, 1.0], [0.7, -1.0], [-1.5, 0.8], [-1.5, -0.8]].forEach(([x, z]) => {
    const base = new T.Mesh(new T.CylinderGeometry(0.16, 0.2, 0.12, 6), M.panel); base.position.set(x, 0.86, z); warKit.add(base);
    const barrel = new T.Mesh(new T.CylinderGeometry(0.035, 0.055, 0.46, 8), redMat); barrel.rotation.z = Math.PI / 2; barrel.position.set(x + 0.23, 0.94, z); warKit.add(barrel);
    const tip = new T.Mesh(new T.SphereGeometry(0.045, 8, 6), redMat); tip.position.set(x + 0.46, 0.94, z); warKit.add(tip);
  });
  // armor strakes + afterburners (faster combat profile)
  const afterburn = [];
  [-0.75, 0, 0.75].forEach((z) => { const a = new T.Mesh(new T.ConeGeometry(0.2, 1.1, 12, 1, true), new T.MeshBasicMaterial({ color: 0xff5a3c, transparent: true, opacity: 0.6, blending: T.AdditiveBlending, depthWrite: false, fog: false })); a.rotation.z = -Math.PI / 2; a.position.set(-5.4, 0.1, z); warKit.add(a); afterburn.push(a); });

  root.scale.setScalar(0.62);
  function setClass(war) { warKit.visible = war; }

  function animate(t) {
    // pulsing charge glow amber↔cyan
    if (chargeGlow) {
      const f = (Math.sin(t * 1.6) * 0.5 + 0.5);
      chargeGlow.material.emissive.setRGB(0.1 + f * 0.0, 0.5 + f * 0.3, 0.2 + f * 0.5);
      chargeGlow.material.emissiveIntensity = 1.6 + f * 1.4;
    }
    spine.material.emissiveIntensity = 1.8 + Math.sin(t * 3) * 0.6;
    engineGlow.forEach((g, i) => g.material.opacity = 0.6 + Math.sin(t * 8 + i) * 0.3);
    // hex bay-door cycle — hangar SEALED most of the time (bees safe inside)
    {
      const u = bays.userData;
      const cyc = (t * 0.16) % 1;
      let open = 0;
      if (cyc < 0.12) open = cyc / 0.12;
      else if (cyc < 0.5) open = 1;
      else if (cyc < 0.62) open = 1 - (cyc - 0.5) / 0.12;
      const slide = open * u.cellR * 2.3;
      u.door.position.set(u.hx + slide, u.deckY + 0.04 + open * 0.04, u.hz);
      u.door.rotation.z = open * 0.3;
      u.inner.visible = open > 0.05; u.well.visible = open > 0.05; u.litFloor.visible = open > 0.05;
      const d = (cyc > 0.12 && cyc < 0.5) ? (cyc - 0.12) / 0.38 : 0;
      u.dockBee.visible = open > 0.4 && cyc < 0.5;
      // LEGO slide-in: approach from aft above the deck, then seat down into the hex socket
      if (d < 0.62) { const s = d / 0.62; u.dockBee.position.set(u.hx - (1 - s) * 2.8, u.deckY + 0.5, u.hz); }
      else { const s = (d - 0.62) / 0.38; u.dockBee.position.set(u.hx, u.deckY + 0.5 - s * (u.deckY + 0.5 - (u.floorY + 0.12)), u.hz); }
      u.dockBee.rotation.z = d < 0.62 ? -0.12 : 0;
    }
    root.position.y = Math.sin(t * 0.7) * 0.05;
    if (warKit.visible) afterburn.forEach((a, i) => { a.material.opacity = 0.5 + Math.sin(t * 16 + i) * 0.3; a.scale.set(1, 1 + Math.sin(t * 20 + i) * 0.3, 1); });
  }
  return { group: root, anchors, animate, setClass };
}

// ───────────────────────────── GRANDMOTHER SHIP ─────────────────────────────
function hexSpiral(rings) {
  const out = [{ q: 0, r: 0 }], dirs = [[1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]];
  for (let k = 1; k <= rings; k++) { let q = -k, r = k; for (let d = 0; d < 6; d++) for (let i = 0; i < k; i++) { out.push({ q, r }); q += dirs[d][0]; r += dirs[d][1]; } }
  return out;
}
function motherProxy(T, M) {
  const g = new T.Group();
  const b = new T.Mesh(new T.IcosahedronGeometry(0.5, 1), M.carbon); b.scale.set(2.0, 0.5, 1.0); g.add(b);
  const n = new T.Mesh(new T.ConeGeometry(0.32, 1.0, 12), M.carbon); n.rotation.z = -Math.PI / 2; n.scale.set(1, 0.5, 1); n.position.x = 1.2; g.add(n);
  for (const s of [1, -1]) { const w = deltaWing(T, M, 1.3, 0.9, 0.04); w.rotation.x = -Math.PI / 2; w.scale.set(1, 1, s); w.position.set(-0.5, -0.05, s * 0.4); g.add(w); }
  const sp = new T.Mesh(new T.BoxGeometry(1.4, 0.03, 0.05), M.cyan); sp.position.set(-0.2, 0.18, 0); g.add(sp);
  return g;
}
function createGrandmother(T = THREE) {
  const M = mats(T);

  const anchors = {};
  const A = (name, x, y, z) => { const o = new T.Object3D(); o.position.set(x, y, z); root.add(o); anchors[name] = o; };

  // ── lifting-body command hull — atmosphere → orbit → interplanetary ──
  const tps = tpsMat(T);
  const body = new T.Mesh(new T.SphereGeometry(1.85, 44, 28), M.hull);
  body.scale.set(3.1, 0.6, 1.7); body.position.x = -0.5; body.castShadow = true; body.receiveShadow = true; root.add(body);
  const nose = new T.Mesh(new T.ConeGeometry(1.15, 4.9, 44), M.hull); nose.rotation.z = -Math.PI / 2; nose.scale.set(1, 0.6, 1.7); nose.position.set(3.8, 0, 0); nose.castShadow = true; root.add(nose);
  const noseTip = new T.Mesh(new T.SphereGeometry(0.1, 8, 6), tps); noseTip.position.set(6.05, 0, 0); root.add(noseTip);
  const belly = new T.Mesh(new T.SphereGeometry(1.9, 28, 16, 0, Math.PI * 2, Math.PI * 0.5, Math.PI * 0.5), tps);
  belly.scale.set(3.1, 0.72, 1.74); belly.position.set(-0.5, 0, 0); root.add(belly);
  A('shield', -0.5, -1.2, 1.5);

  // big swept delta wings + canted tail fins
  [1, -1].forEach((s) => {
    const w = deltaWing(T, M, 5.6, 3.9, 0.16); w.rotation.x = -Math.PI / 2; w.scale.set(1, 1, s);
    w.position.set(-2.0, -0.2, s * 1.4); w.castShadow = true; root.add(w);
    const le = new T.Mesh(new T.BoxGeometry(4.0, 0.06, 0.07), M.cyanDim); le.position.set(0.0, -0.05, s * 2.7); le.rotation.y = -s * 0.5; root.add(le);
  });
  A('aerowing', -1.0, 0.1, 3.6);
  [1, -1].forEach((s) => { const f = deltaWing(T, M, 2.0, 1.6, 0.1); f.scale.set(1, -1, 1); f.position.set(-4.0, 0.4, s * 0.85); f.rotation.x = s * 0.55; root.add(f); });

  // ── DORSAL HANGAR — honeycomb of HEXAGONAL Mother-Ship bays (sealed inside) ──
  const dy = 1.0;
  let cradleGlow = null, hinge = null;
  const GH = buildHexHangar(T, M, root, { cellR: 0.62, deckY: dy, xLim: 3.0, zLim: 1.45, xShift: -0.4, openX: -0.4, openZ: 0 });
  const HX = GH.ox, HZ = GH.oz, gFloorY = dy - 0.5;
  const gInner = GH.inner;
  // Mother lifting-body parked INSIDE the open bay + charge halo
  const cm = motherProxy(T, M); cm.scale.setScalar(0.34); cm.position.set(HX, gFloorY + 0.16, HZ); gInner.add(cm);
  cradleGlow = new T.Mesh(new T.TorusGeometry(0.34, 0.03, 8, 20), M.amber); cradleGlow.rotation.x = Math.PI / 2; cradleGlow.position.set(HX, gFloorY + 0.02, HZ); gInner.add(cradleGlow);
  A('cradle', HX, dy + 0.6, HZ + 0.4);
  A('modules', HX, dy + 0.7, HZ - 0.3);
  A('crew', 2.5, 1.2, 0.5);
  // a Mother being recovered THROUGH the open bay
  hinge = motherProxy(T, M); hinge.scale.setScalar(0.34); root.add(hinge);
  const gHangar = { HX, HZ, dy, gFloorY, gInner, door: GH.door, well: GH.well, litFloor: GH.litFloor, hinge, cellR: GH.cellR };

  // crew bridge canopy near nose
  const canopy = new T.Mesh(new T.SphereGeometry(0.5, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.55), M.glass); canopy.scale.set(1.5, 0.7, 1.0); canopy.position.set(2.5, 0.82, 0); root.add(canopy);
  const canWin = new T.Mesh(new T.TorusGeometry(0.42, 0.04, 6, 16, Math.PI), M.amber); canWin.position.set(2.62, 0.78, 0); canWin.rotation.set(Math.PI / 2, 0, 0); root.add(canWin);

  // ── propulsion: nuclear-electric plasma cluster (tail) ──
  const gEngineGlow = [];
  [[0.55, 0.45], [-0.55, 0.45], [0.55, -0.55], [-0.55, -0.55]].forEach(([z, y]) => {
    const noz = new T.Mesh(new T.CylinderGeometry(0.32, 0.5, 0.9, 16), M.panel); noz.rotation.z = Math.PI / 2; noz.position.set(-4.9, y, z); root.add(noz);
    const ring = new T.Mesh(new T.TorusGeometry(0.4, 0.025, 6, 16), M.cyan); ring.rotation.y = Math.PI / 2; ring.position.set(-5.2, y, z); root.add(ring);
    const g = new T.Mesh(new T.CircleGeometry(0.34, 18), new T.MeshBasicMaterial({ color: 0x6ad8ff, transparent: true, opacity: 0.85, blending: T.AdditiveBlending, depthWrite: false, fog: false })); g.position.set(-5.24, y, z); g.rotation.y = -Math.PI / 2; root.add(g); gEngineGlow.push(g);
  });
  A('engine', -5.2, 0.7, 0);
  // conformal hex-lozenge radiators flush to the dorsal hull (no protruding slabs)
  [1, -1].forEach((s) => { const r = new T.Mesh(new T.CylinderGeometry(0.7, 0.7, 0.04, 6), new T.MeshStandardMaterial({ color: 0x141b20, metalness: 0.6, roughness: 0.5, emissive: 0x200a06, emissiveIntensity: 0.3 })); r.rotation.set(Math.PI / 2, 0, Math.PI / 6); r.scale.set(2.4, 1, 1); r.position.set(-2.7, 0.62, s * 1.15); root.add(r); for (let i = 0; i < 4; i++) { const f = new T.Mesh(new T.BoxGeometry(2.7, 0.045, 0.02), M.dark); f.position.set(-2.7, 0.66, s * 1.15 - 0.2 + i * 0.13); root.add(f); } });
  A('radiator', -2.7, 0.9, 1.3);
  const gcomms = new T.Mesh(new T.CylinderGeometry(0.5, 0.5, 0.05, 6), M.door); gcomms.rotation.set(Math.PI / 2, 0, Math.PI / 6); gcomms.position.set(2.95, 1.0, 0); root.add(gcomms);
  const gcommsFace = new T.Mesh(new T.CylinderGeometry(0.38, 0.38, 0.02, 6), M.cyanDim); gcommsFace.rotation.set(Math.PI / 2, 0, Math.PI / 6); gcommsFace.position.set(2.95, 1.03, 0); root.add(gcommsFace);
  A('comms', 2.95, 1.3, 0.3);

  // ── WAR-CLASS kit — heavy turrets + spinal cannon + afterburners (hidden in Public) ──
  const gWarKit = new T.Group(); gWarKit.visible = false; root.add(gWarKit);
  const gRed = new T.MeshStandardMaterial({ color: 0x1a0606, emissive: 0xff3b2f, emissiveIntensity: 1.9, metalness: 0.5, roughness: 0.4 });
  [[1.4, 1.5], [1.4, -1.5], [-1.6, 1.5], [-1.6, -1.5]].forEach(([x, z]) => {
    const base = new T.Mesh(new T.CylinderGeometry(0.26, 0.32, 0.2, 6), M.panel); base.position.set(x, 0.95, z); gWarKit.add(base);
    const barrel = new T.Mesh(new T.CylinderGeometry(0.06, 0.09, 0.8, 8), gRed); barrel.rotation.z = Math.PI / 2; barrel.position.set(x + 0.4, 1.05, z); gWarKit.add(barrel);
    const tip = new T.Mesh(new T.SphereGeometry(0.08, 8, 6), gRed); tip.position.set(x + 0.8, 1.05, z); gWarKit.add(tip);
  });
  // spinal directed-energy cannon along the nose
  const spinal = new T.Mesh(new T.CylinderGeometry(0.12, 0.16, 5.0, 10), M.panel); spinal.rotation.z = Math.PI / 2; spinal.position.set(3.4, 0.5, 0); gWarKit.add(spinal);
  const spinalTip = new T.Mesh(new T.SphereGeometry(0.16, 12, 10), gRed); spinalTip.position.set(6.0, 0.5, 0); gWarKit.add(spinalTip);
  const gAfter = [];
  [[0.55, 0.45], [-0.55, 0.45], [0.55, -0.55], [-0.55, -0.55]].forEach(([z, y]) => { const a = new T.Mesh(new T.ConeGeometry(0.34, 1.6, 14, 1, true), new T.MeshBasicMaterial({ color: 0xff5a3c, transparent: true, opacity: 0.6, blending: T.AdditiveBlending, depthWrite: false, fog: false })); a.rotation.z = Math.PI / 2; a.position.set(-6.1, y, z); gWarKit.add(a); gAfter.push(a); });

  root.scale.setScalar(0.62);
  function setClass(war) { gWarKit.visible = war; }

  function animate(t) {
    const f = (Math.sin(t * 1.8) * 0.5 + 0.5);
    if (cradleGlow) cradleGlow.material.emissiveIntensity = 1.4 + f * 1.6;
    gEngineGlow.forEach((g, i) => g.material.opacity = 0.55 + Math.sin(t * 7 + i) * 0.3);
    // hex bay-door cycle — Mother Ships protected inside (one bay cycles at a time)
    {
      const u = gHangar;
      const cyc = (t * 0.13) % 1;
      let open = 0;
      if (cyc < 0.12) open = cyc / 0.12;
      else if (cyc < 0.5) open = 1;
      else if (cyc < 0.62) open = 1 - (cyc - 0.5) / 0.12;
      const slide = open * u.cellR * 2.3;
      u.door.position.set(u.HX + slide, u.dy + 0.05 + open * 0.05, u.HZ);
      u.door.rotation.z = open * 0.3;
      u.gInner.visible = open > 0.05; u.well.visible = open > 0.05; u.litFloor.visible = open > 0.05;
      const d = (cyc > 0.12 && cyc < 0.5) ? (cyc - 0.12) / 0.38 : 0;
      u.hinge.visible = open > 0.4 && cyc < 0.5;
      // LEGO slide-in: Mother approaches from aft above the deck, then seats into the hex socket
      if (d < 0.62) { const s = d / 0.62; u.hinge.position.set(u.HX - (1 - s) * 3.6, u.dy + 0.6, u.HZ); }
      else { const s = (d - 0.62) / 0.38; u.hinge.position.set(u.HX, u.dy + 0.6 - s * (u.dy + 0.6 - (u.gFloorY + 0.16)), u.HZ); }

    }
    root.rotation.z = Math.sin(t * 0.3) * 0.02;
    root.position.y = Math.sin(t * 0.6) * 0.05;
    if (gWarKit.visible) gAfter.forEach((a, i) => { a.material.opacity = 0.5 + Math.sin(t * 14 + i) * 0.3; a.scale.set(1 + Math.sin(t * 18 + i) * 0.25, 1, 1); });
  }
  return { group: root, anchors, animate, setClass };
}

    { k: 'shield', n: '04', name: 'Ablative heat shield', fn: 'Survives hypersonic re-entry', tech: 'Lifting-body belly · ablative TPS tiles' },
    { k: 'engine', n: '05', name: 'Variable-cycle drive ×3', fn: 'Atmosphere → orbit → vacuum, one airframe', tech: 'Turbo-ramjet (air-breathing) → rocket → Hall-effect ion · single-stage to orbit' },
    { k: 'solar', n: '06', name: 'Deployable solar', fn: 'On-orbit power (stows for atmosphere)', tech: 'Triple-junction GaAs · wing-conformal' },
    { k: 'radiator', n: '07', name: 'Deployable radiators', fn: 'Reject waste heat in vacuum', tech: 'Two-phase ammonia loop' },
    { k: 'rcs', n: '08', name: 'RCS thruster quads', fn: 'Attitude & station-keeping', tech: 'Cold-gas / monoprop · 6-DOF' },
    { k: 'comms', n: '09', name: 'Ku + optical comms', fn: 'Orbital mesh & ground link', tech: 'Phased-array + laser crosslink' },
    { k: 'bridge', n: '10', name: 'AGI hive controller', fn: 'Coordinates the 100k swarm', tech: 'Distributed edge-AI · consensus tasking' },
  ],
  grand: [
    { k: 'modules', n: '01', name: 'Dorsal docking bays', fn: '500 Mother Ships berth here', tech: 'Internal honeycomb close-packing · LEGO hinge-lock · load-sharing truss' },
    { k: 'crew', n: '02', name: 'Crew command decks', fn: '~40 human operators aboard', tech: 'Radiation-shielded habitat · closed-loop life support' },
    { k: 'cradle', n: '03', name: 'Mother-Ship cradle', fn: 'Docks & recharges a whole carrier', tech: 'Berthing latch + megawatt power transfer' },
    { k: 'aerowing', n: '04', name: 'Swept delta wings', fn: 'Atmospheric lift, surface → orbit', tech: 'Blended lifting-body planform' },
    { k: 'shield', n: '05', name: 'Ablative heat shield', fn: 'Re-entry at any planet', tech: 'Lifting-body belly · ablative TPS' },
    { k: 'engine', n: '06', name: 'Nuclear-electric plasma cluster', fn: 'Surface → orbit → cislunar & interplanetary', tech: 'MW-class reactor · magnetoplasma drive' },
    { k: 'radiator', n: '07', name: 'Primary radiators', fn: 'Reactor & ship heat rejection', tech: 'Large deployable two-phase panels' },
    { k: 'comms', n: '08', name: 'Fleet C2 array', fn: 'Commands the whole swarm', tech: 'Optical + Ku mesh · LEO relay' },
  ],
};
const partsLayer = document.getElementById('parts');
let showParts = true, partEls = [];
function buildParts() {
  partsLayer.innerHTML = ''; partEls = [];
  const anc = TIERS[tier].model.anchors;
  (PARTS[tier] || []).forEach((d) => {
    const a = anc[d.k]; if (!a) return;
    const el = document.createElement('div'); el.className = 'pcallout';
    el.innerHTML = `<span class="pdot"></span><div class="pcard"><span class="pn">${d.n}</span><div><div class="pname">${d.name}</div><div class="pfn">${d.fn}</div><div class="ptech">${d.tech}</div></div></div>`;
    partsLayer.appendChild(el); partEls.push({ a, el });
  });
  partsLayer.style.display = showParts ? 'block' : 'none';
}
function projectParts() {
  if (!showParts) return;
  partEls.forEach(({ a, el }) => {
    a.getWorldPosition(tmpV); tmpV.project(camera);
    const behind = tmpV.z > 1;
    el.style.left = ((tmpV.x * 0.5 + 0.5) * innerWidth) + 'px';
    el.style.top = ((-tmpV.y * 0.5 + 0.5) * innerHeight) + 'px';
    el.style.opacity = behind ? '0' : '1';
  });
}
let camFrom = null, camTo = null, camT = 1, tgtFrom = null, tgtTo = null;
function goTier(name) {
  tier = name; const T = TIERS[name];
  camFrom = camera.position.clone(); camTo = new THREE.Vector3(...T.cam);
  tgtFrom = controls.target.clone(); tgtTo = new THREE.Vector3(...T.tgt);
  camT = 0; controls.minDistance = T.dist[0]; controls.maxDistance = T.dist[1];
  setVisible(); setEnv(name); buildParts(); updateCaption();
  document.querySelectorAll('.tier-btn').forEach((b) => b.classList.toggle('on', b.dataset.t === name));
}
function updateCaption() {
  const cap = CAPTIONS[tier];
  document.getElementById('cap-title').textContent = cap.t;
  document.getElementById('cap-body').textContent = cap.m;
  const note = document.getElementById('cap-note');
  let extra = cap.c;
  if (warClass) {
    const w = tier === 'bee' ? 'WAR CLASS · LASER DEW ARMED · +18% dash speed · IR-suppressed'
      : tier === 'mother' ? 'WAR CLASS · 4× laser turrets · afterburners (+Δv) · armored hull'
        : 'WAR CLASS · spinal DEW cannon · heavy turrets · afterburners';
    extra = (extra ? extra + ' · ' : '') + w;
  }
  note.textContent = extra;
  note.style.display = extra ? 'block' : 'none';
}

// ---- UI ----
document.querySelectorAll('.tier-btn').forEach((b) => b.addEventListener('click', () => goTier(b.dataset.t)));
document.querySelectorAll('.class-btn').forEach((b) => b.addEventListener('click', () => {
  warClass = b.dataset.c === 'war';
  document.querySelectorAll('.class-btn').forEach((x) => x.classList.toggle('on', x === b));
  document.body.classList.toggle('war', warClass);
  if (mother.setClass) mother.setClass(warClass);
  if (grand.setClass) grand.setClass(warClass);
  setVisible(); updateCaption();
}));
document.getElementById('btn-rot').addEventListener('click', (e) => { controls.autoRotate = !controls.autoRotate; e.currentTarget.classList.toggle('on', controls.autoRotate); });
document.getElementById('btn-parts').addEventListener('click', (e) => { showParts = !showParts; partsLayer.style.display = showParts ? 'block' : 'none'; e.currentTarget.classList.toggle('on', showParts); });

// ---- loop ----
const clock = new THREE.Clock(); const tmpV = new THREE.Vector3();
function tick() {
 try {
  const dt = Math.min(clock.getDelta(), 0.05), t = clock.elapsedTime;
  if (tier === 'bee') bee.spinRotors(dt, 0.85), bee.flutterWings(t, 0.16);
  mother.animate(t); grand.animate(t);
  const fl = 0.4 + Math.sin(t * 14) * 0.18;
  motherThr.forEach((m, i) => m.material.opacity = fl + i * 0.02);
  grandThr.forEach((m, i) => m.material.opacity = (0.45 + Math.sin(t * 11 + i) * 0.2));

  // laser fire cycle (war + bee)
  if (warClass && tier === 'bee') {
    const cyc = t % 3.2;
    const emWorld = new THREE.Vector3(0.45 * 1.5, (0.4 - 0.35 * 1.5), 0); // approx emitter world via bee
    emitter.getWorldPosition(emWorld);
    if (cyc > 1.4 && cyc < 2.0) {
      const fire = 1 - Math.abs((cyc - 1.7) / 0.3);
      beamMat.opacity = 0.9 * fire; targetMat.opacity = 0.8;
      const dir = tmpV.subVectors(target, emWorld); const len = dir.length();
      beam.scale.set(1, len, 1);
      beam.position.copy(emWorld).add(dir.clone().multiplyScalar(0.5));
      beam.parent.worldToLocal(beam.position);
      beam.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
      beam.quaternion.premultiply(beam.parent.getWorldQuaternion(new THREE.Quaternion()).invert());
      reticle.material.opacity = 0.9; reticle.scale.setScalar(1 + (1 - fire) * 0.5);
    } else {
      beamMat.opacity *= 0.8; reticle.material.opacity = 0.25 + Math.sin(t * 6) * 0.1;
    }
  }
  // camera tween between tiers
  if (camT < 1) { camT = Math.min(1, camT + dt * 1.6); const e = camT < 0.5 ? 2 * camT * camT : 1 - Math.pow(-2 * camT + 2, 2) / 2; camera.position.lerpVectors(camFrom, camTo, e); controls.target.lerpVectors(tgtFrom, tgtTo, e); }
  controls.update();
  projectParts();
  renderer.render(scene, camera);
 } catch (e) { window.__tickErr = (e && e.message) || String(e); console.error('TICKERR', e); }
  requestAnimationFrame(tick);
}
setVisible(); setEnv('bee'); buildParts(); updateCaption(); tick();
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
window.__fleet = { goTier, scene, camera, bee, mother, grand, getTier: () => tier, render: () => { projectParts(); renderer.render(scene, camera); } };


</script>
