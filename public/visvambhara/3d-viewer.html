<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VESPER — 3D Drone Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root{
    --bg:#061018; --bg2:#04222b; --ink:#e8f3f6; --mut:#7e98a1;
    --cyan:#22d3ee; --cyan-dim:#0e6275; --line:rgba(120,200,220,.16);
    --panel:rgba(8,20,26,.72);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(120% 90% at 70% 15%, #0a2230 0%, #061018 48%, #03080c 100%);
    color:var(--ink);
  }
  #stage{position:fixed;inset:0;z-index:1}
  canvas{display:block}

  .mono{font-family:'JetBrains Mono',monospace}

  /* ---- header ---- */
  header{position:fixed;top:0;left:0;right:0;z-index:10;padding:26px 30px;
    display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
  .brand{display:flex;align-items:center;gap:14px}
  .mark{width:40px;height:40px;position:relative;flex:0 0 auto}
  .mark svg{width:100%;height:100%;display:block}
  .wordmark{line-height:1}
  .wordmark .name{font-size:23px;font-weight:700;letter-spacing:.32em;padding-left:.32em}
  .wordmark .sub{font-size:10.5px;letter-spacing:.34em;color:var(--mut);margin-top:5px;padding-left:.34em}
  .status{display:flex;flex-direction:column;align-items:flex-end;gap:7px;text-align:right}
  .chip{display:inline-flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.22em;
    color:var(--cyan);border:1px solid var(--line);border-radius:999px;padding:7px 13px;background:var(--panel);
    backdrop-filter:blur(8px)}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 0 rgba(34,211,238,.6);
    animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,211,238,.55)}70%{box-shadow:0 0 0 8px rgba(34,211,238,0)}100%{box-shadow:0 0 0 0 rgba(34,211,238,0)}}
  .mode-tag{font-size:10px;letter-spacing:.26em;color:var(--mut)}
  .mode-tag b{color:var(--ink);font-weight:500}

  /* ---- spec rail (left) ---- */
  .specs{position:fixed;left:30px;top:50%;transform:translateY(-50%);z-index:9;
    display:flex;flex-direction:column;gap:18px;pointer-events:none}
  .spec{border-left:2px solid var(--cyan-dim);padding-left:12px}
  .spec .v{font-size:25px;font-weight:600;letter-spacing:-.01em;line-height:1}
  .spec .v small{font-size:12px;color:var(--mut);font-weight:500;letter-spacing:.04em}
  .spec .k{font-size:9.5px;letter-spacing:.2em;color:var(--mut);margin-top:5px;text-transform:uppercase}

  /* ---- control dock ---- */
  .dock{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:11;
    display:flex;gap:8px;padding:9px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;backdrop-filter:blur(14px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .btn{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:74px;
    padding:11px 12px 10px;border-radius:11px;border:1px solid transparent;cursor:pointer;
    background:transparent;color:var(--mut);transition:.18s;font-family:inherit}
  .btn:hover{background:rgba(34,211,238,.06);color:var(--ink)}
  .btn .ico{width:22px;height:22px}
  .btn .lbl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
  .btn.on{background:rgba(34,211,238,.12);border-color:var(--line);color:var(--cyan)}
  .btn.on .ico{filter:drop-shadow(0 0 6px rgba(34,211,238,.6))}
  .btn svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .dock .sep{width:1px;background:var(--line);margin:6px 3px}

  /* ---- hotspots ---- */
  #hotspots{position:fixed;inset:0;z-index:8;display:none}
  .hotspot{position:absolute;transform:translate(-50%,-50%);transition:opacity .25s}
  .hs-dot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;
    border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(34,211,238,.18),0 0 14px rgba(34,211,238,.7)}
  .hs-card{position:absolute;left:18px;top:-14px;display:flex;gap:10px;align-items:flex-start;
    width:max-content;max-width:248px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .hs-n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);font-weight:700}
  .hs-t{font-size:13px;font-weight:600;letter-spacing:.01em}
  .hs-d{font-size:10.5px;color:var(--mut);margin-top:3px;line-height:1.4}

  /* ---- scale tag ---- */
  #scale-tag{position:fixed;right:30px;bottom:96px;z-index:9;opacity:0;transition:.3s;
    text-align:right;pointer-events:none}
  #scale-tag.show{opacity:1}
  #scale-tag .big{font-size:34px;font-weight:700;letter-spacing:-.02em}
  #scale-tag .lil{font-size:10px;letter-spacing:.2em;color:var(--mut);margin-top:3px}

  /* ---- nav links ---- */
  .nav{position:fixed;right:30px;bottom:26px;z-index:11;display:flex;gap:10px}
  .nav a{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);
    text-decoration:none;border:1px solid var(--line);border-radius:10px;padding:11px 15px;
    background:var(--panel);backdrop-filter:blur(10px);transition:.18s;display:flex;align-items:center;gap:8px}
  .nav a:hover{color:var(--cyan);border-color:rgba(34,211,238,.4)}

  .hint{position:fixed;left:50%;top:108px;transform:translateX(-50%);z-index:7;
    font-size:10.5px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;
    opacity:.8;animation:fade 1s ease 5s forwards;pointer-events:none}
  @keyframes fade{to{opacity:0}}
  @media (max-width:860px){.specs,.hint{display:none}.btn{min-width:58px}.btn .lbl{display:none}}
</style>

  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ===== vesper-model.js =====
// vesper-model.js
// Procedural Three.js model of the VESPER bee-sized stealth satellite micro-drone.
// Returns a group plus metadata: rotors (for spin), part groups (for exploded view),
// and anchor points (Object3D) used to position HTML hotspot labels.

function createVesper(THREE_NS) {
  const T = THREE_NS || THREE;

  // ---- shared materials -------------------------------------------------
  const carbon = new T.MeshStandardMaterial({
    color: 0x12161b, metalness: 0.72, roughness: 0.42, flatShading: true,
  });
  const carbonDark = new T.MeshStandardMaterial({
    color: 0x0b0e12, metalness: 0.65, roughness: 0.55, flatShading: true,
  });
  const panel = new T.MeshStandardMaterial({
    color: 0x1b2128, metalness: 0.8, roughness: 0.32, flatShading: true,
  });
  const accent = new T.MeshStandardMaterial({
    color: 0x06141a, emissive: 0x22d3ee, emissiveIntensity: 2.4, metalness: 0.2, roughness: 0.4,
  });
  const accentDim = new T.MeshStandardMaterial({
    color: 0x06141a, emissive: 0x22d3ee, emissiveIntensity: 1.1, metalness: 0.3, roughness: 0.5,
  });
  // real honeybee amber/gold for the abdomen banding
  const beeStripe = new T.MeshStandardMaterial({
    color: 0x1c0f02, emissive: 0xffb240, emissiveIntensity: 1.9, metalness: 0.3, roughness: 0.45,
  });
  const glass = new T.MeshPhysicalMaterial({
    color: 0x0a1418, metalness: 0.1, roughness: 0.08, transmission: 0.6,
    transparent: true, opacity: 0.9, emissive: 0x22d3ee, emissiveIntensity: 0.6,
    clearcoat: 1, clearcoatRoughness: 0.1,
  });
  const blur = new T.MeshBasicMaterial({
    color: 0x9fe9f5, transparent: true, opacity: 0.0, side: T.DoubleSide, depthWrite: false,
  });

  // translucent insect-wing texture (membrane + veins) drawn on a canvas
  function wingTexture() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 130;
    const x = c.getContext('2d');
    const grad = x.createLinearGradient(0, 0, 256, 0);
    grad.addColorStop(0, 'rgba(190,245,255,0.55)');
    grad.addColorStop(0.6, 'rgba(120,215,235,0.22)');
    grad.addColorStop(1, 'rgba(90,195,220,0.05)');
    const shape = () => {
      x.beginPath();
      x.moveTo(8, 65);
      x.bezierCurveTo(55, 8, 205, 16, 248, 56);
      x.bezierCurveTo(254, 66, 232, 116, 150, 122);
      x.bezierCurveTo(70, 124, 20, 100, 8, 65);
      x.closePath();
    };
    shape(); x.fillStyle = grad; x.fill();
    // membrane cell veins
    x.strokeStyle = 'rgba(130,215,235,0.7)'; x.lineWidth = 1.6;
    const tips = [[245, 56], [240, 82], [215, 110], [150, 120], [90, 116]];
    tips.forEach((p) => { x.beginPath(); x.moveTo(14, 66); x.quadraticCurveTo(110, 60, p[0], p[1]); x.stroke(); });
    // cross-struts (mechanical lattice)
    x.strokeStyle = 'rgba(110,200,222,0.45)'; x.lineWidth = 1;
    for (let i = 1; i < 5; i++) { const xx = 40 + i * 42; x.beginPath(); x.moveTo(xx, 30); x.lineTo(xx - 8, 110); x.stroke(); }
    // bright leading-edge spar
    x.strokeStyle = 'rgba(180,240,255,0.95)'; x.lineWidth = 4; x.beginPath(); x.moveTo(12, 62); x.lineTo(192, 48); x.stroke();
    shape(); x.strokeStyle = 'rgba(160,235,255,0.8)'; x.lineWidth = 2.4; x.stroke();
    const tex = new T.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
  }
  const wingMat = new T.MeshBasicMaterial({
    map: wingTexture(), transparent: true, side: T.DoubleSide, depthWrite: false, opacity: 0.92,
  });

  const root = new T.Group();
  root.name = 'vesper';

  const parts = {};        // named part groups, each with .userData.explodeOffset
  const anchors = {};      // named Object3D anchor points for hotspots
  const rotors = [];       // { pivot, blurMesh }

  function mkPart(name, offset) {
    const g = new T.Group();
    g.name = name;
    g.userData.explodeOffset = offset || new T.Vector3();
    g.userData.basePos = g.position.clone();
    parts[name] = g;
    root.add(g);
    return g;
  }

  // ---- THORAX (central airframe) ---------------------------------------
  const thorax = mkPart('airframe', new T.Vector3(0, 0, 0));
  {
    const core = new T.Mesh(new T.IcosahedronGeometry(0.92, 1), carbon);
    core.scale.set(1.35, 0.92, 1.05);
    core.castShadow = true; core.receiveShadow = true;
    thorax.add(core);

    // dorsal armored panel
    const dorsal = new T.Mesh(new T.IcosahedronGeometry(0.78, 1), panel);
    dorsal.scale.set(1.15, 0.55, 0.9);
    dorsal.position.set(0.0, 0.42, 0);
    thorax.add(dorsal);

    // 360° omnidirectional vision dome — clear sphere ringed with lenses
    const dome = new T.Mesh(new T.SphereGeometry(0.24, 24, 18), glass);
    dome.position.set(0.05, 0.74, 0);
    thorax.add(dome);
    const domeCore = new T.Mesh(new T.SphereGeometry(0.13, 16, 12), accentDim);
    domeCore.position.set(0.05, 0.74, 0); thorax.add(domeCore);
    for (let i = 0; i < 8; i++) {
      const a2 = (i / 8) * Math.PI * 2;
      const lens = new T.Mesh(new T.SphereGeometry(0.045, 10, 8), accent);
      lens.position.set(0.05 + Math.cos(a2) * 0.22, 0.74, Math.sin(a2) * 0.22);
      thorax.add(lens);
    }
    const av = new T.Object3D(); av.position.set(0.05, 1.0, 0.0); thorax.add(av); anchors.vision360 = av;

    // acoustic / mic array — recessed ring of ports on the dorsal deck
    const mic = new T.Mesh(new T.TorusGeometry(0.34, 0.03, 8, 28), accentDim);
    mic.rotation.x = Math.PI / 2;
    mic.position.set(-0.35, 0.58, 0);
    thorax.add(mic);
    const am = new T.Object3D(); am.position.set(-0.45, 0.7, 0.3); thorax.add(am); anchors.acoustic = am;

    // cyan accent vent slits on the sides
    for (const s of [1, -1]) {
      for (let i = 0; i < 3; i++) {
        const slit = new T.Mesh(new T.BoxGeometry(0.42, 0.045, 0.04), accentDim);
        slit.position.set(0.1 - i * 0.34, 0.05, s * 0.78);
        slit.rotation.y = s * 0.1;
        thorax.add(slit);
      }
    }
    const a = new T.Object3D(); a.position.set(0.4, 0.5, 0.6); thorax.add(a); anchors.airframe = a;
  }

  // ---- HEAD + compound optical sensors ---------------------------------
  const head = mkPart('sensor', new T.Vector3(2.0, 0.4, 0));
  head.position.set(1.18, -0.02, 0);
  head.userData.basePos = head.position.clone();
  {
    const skull = new T.Mesh(new T.IcosahedronGeometry(0.54, 1), carbonDark);
    skull.scale.set(1.05, 1.0, 1.2);
    skull.castShadow = true;
    head.add(skull);

    // large bee-like compound-eye sensor domes (night-vision optics)
    for (const s of [1, -1]) {
      const eye = new T.Mesh(new T.SphereGeometry(0.32, 22, 18, 0, Math.PI * 2, 0, Math.PI * 0.62), glass);
      eye.rotation.z = -Math.PI / 2 - 0.42;
      eye.rotation.y = s * 0.55;
      eye.position.set(0.22, 0.08, s * 0.34);
      head.add(eye);
      const iris = new T.Mesh(new T.SphereGeometry(0.12, 16, 12), accent);
      iris.position.set(0.4, 0.1, s * 0.36);
      head.add(iris);
    }
    // chin gimbal — thermal / heatmap imager
    const gimbal = new T.Mesh(new T.SphereGeometry(0.17, 18, 14), accentDim);
    gimbal.position.set(0.36, -0.3, 0);
    head.add(gimbal);
    const gimbalEye = new T.Mesh(new T.SphereGeometry(0.08, 14, 10), accent);
    gimbalEye.position.set(0.5, -0.3, 0); head.add(gimbalEye);

    // bee antennae — thin curved feelers with glowing tips
    for (const s of [1, -1]) {
      const ant = new T.Group();
      const seg1 = new T.Mesh(new T.CylinderGeometry(0.018, 0.026, 0.34, 6), carbonDark);
      seg1.position.set(0.0, 0.17, 0); ant.add(seg1);
      const seg2 = new T.Mesh(new T.CylinderGeometry(0.012, 0.018, 0.32, 6), carbonDark);
      seg2.position.set(0.12, 0.46, 0); seg2.rotation.z = -0.7; ant.add(seg2);
      const tip = new T.Mesh(new T.SphereGeometry(0.04, 10, 8), accent);
      tip.position.set(0.33, 0.58, 0); ant.add(tip);
      ant.position.set(0.3, 0.3, s * 0.16);
      ant.rotation.x = s * 0.35;
      head.add(ant);
    }

    const a = new T.Object3D(); a.position.set(0.5, 0.3, 0.42); head.add(a); anchors.sensor = a;
    const tn = new T.Object3D(); tn.position.set(0.55, -0.32, 0.0); head.add(tn); anchors.thermal = tn;
  }

  // ---- ABDOMEN (battery + bee stripes) ---------------------------------
  const abdomen = mkPart('power', new T.Vector3(-2.1, -0.1, 0));
  abdomen.position.set(-1.35, -0.05, 0);
  abdomen.userData.basePos = abdomen.position.clone();
  {
    const seg = new T.Mesh(new T.IcosahedronGeometry(0.74, 1), carbon);
    seg.scale.set(1.75, 0.86, 0.86);
    seg.position.x = -0.2;
    seg.castShadow = true;
    abdomen.add(seg);

    // glowing bee stripes — bolder & more segments
    const stripeN = 5;
    for (let i = 0; i < stripeN; i++) {
      const f = i / (stripeN - 1);
      const rad = 0.66 - f * 0.34;
      const ring = new T.Mesh(new T.TorusGeometry(rad, 0.06, 10, 30), beeStripe);
      ring.rotation.y = Math.PI / 2;
      ring.position.x = 0.28 - i * 0.4;
      ring.scale.set(1, 0.84, 1);
      abdomen.add(ring);
      // dark segment groove just behind each stripe
      const groove = new T.Mesh(new T.TorusGeometry(rad + 0.02, 0.085, 10, 30), carbonDark);
      groove.rotation.y = Math.PI / 2;
      groove.position.x = 0.28 - i * 0.4 - 0.16;
      groove.scale.set(1, 0.84, 1);
      abdomen.add(groove);
    }
    // stinger / rear thruster
    const stinger = new T.Mesh(new T.ConeGeometry(0.12, 0.6, 8), panel);
    stinger.rotation.z = Math.PI / 2;
    stinger.position.x = -1.4;
    abdomen.add(stinger);
    const stingTip = new T.Mesh(new T.SphereGeometry(0.06, 10, 8), accent);
    stingTip.position.x = -1.7; abdomen.add(stingTip);

    const a = new T.Object3D(); a.position.set(-0.3, -0.4, 0.45); abdomen.add(a); anchors.power = a;
  }

  // ---- internal SATCOM core (revealed in exploded view) ----------------
  const core = mkPart('core', new T.Vector3(0, 2.3, 0));
  {
    const cube = new T.Mesh(new T.BoxGeometry(0.5, 0.42, 0.5), panel);
    core.add(cube);
    const edges = new T.Mesh(new T.BoxGeometry(0.54, 0.12, 0.54), accent);
    edges.position.y = 0.0; core.add(edges);
    const a = new T.Object3D(); a.position.set(0.0, 0.35, 0.35); core.add(a); anchors.core = a;
  }

  // ---- ANTENNA (SATCOM phased array) -----------------------------------
  const antenna = mkPart('uplink', new T.Vector3(0.4, 2.6, -0.6));
  antenna.position.set(-0.55, 0.55, 0);
  antenna.userData.basePos = antenna.position.clone();
  {
    const mast = new T.Mesh(new T.CylinderGeometry(0.035, 0.06, 1.5, 8), panel);
    mast.position.set(0, 0.7, 0);
    mast.rotation.z = 0.22;
    antenna.add(mast);
    // flat phased-array dish at the tip
    const dish = new T.Mesh(new T.CylinderGeometry(0.34, 0.34, 0.06, 6), panel);
    dish.position.set(-0.32, 1.42, 0);
    dish.rotation.set(0, 0, -0.5);
    antenna.add(dish);
    const dishFace = new T.Mesh(new T.CircleGeometry(0.3, 6), accentDim);
    dishFace.position.set(-0.3, 1.45, 0);
    dishFace.rotation.set(0, Math.PI / 2, 1.07);
    antenna.add(dishFace);
    const beacon = new T.Mesh(new T.SphereGeometry(0.07, 12, 10), accent);
    beacon.position.set(-0.3, 1.46, 0);
    antenna.add(beacon);
    anchors.uplinkBeacon = beacon;
    const a = new T.Object3D(); a.position.set(-0.5, 1.6, 0.4); antenna.add(a); anchors.uplink = a;
  }

  // ---- ARMS + DUCTED ROTORS (×4) ---------------------------------------
  const rotorGroup = mkPart('rotors', new T.Vector3(0, 1.4, 0));
  const armDefs = [
    { x: 0.85, z: 0.95 }, { x: 0.85, z: -0.95 },
    { x: -0.7, z: 0.95 }, { x: -0.7, z: -0.95 },
  ];
  armDefs.forEach((d, idx) => {
    const tip = new T.Vector3(d.x * 1.7, 0.62, d.z * 1.55);
    // arm strut from thorax to rotor
    const from = new T.Vector3(d.x * 0.4, 0.2, d.z * 0.45);
    const dir = new T.Vector3().subVectors(tip, from);
    const len = dir.length();
    const arm = new T.Mesh(new T.CylinderGeometry(0.06, 0.09, len, 8), carbonDark);
    arm.position.copy(from.clone().add(tip).multiplyScalar(0.5));
    arm.quaternion.setFromUnitVectors(new T.Vector3(0, 1, 0), dir.clone().normalize());
    arm.castShadow = true;
    rotorGroup.add(arm);

    // ducted ring
    const duct = new T.Mesh(new T.TorusGeometry(0.6, 0.07, 12, 36), panel);
    duct.position.copy(tip);
    duct.rotation.x = Math.PI / 2;
    duct.castShadow = true;
    rotorGroup.add(duct);
    const ductGlow = new T.Mesh(new T.TorusGeometry(0.6, 0.022, 8, 36), accentDim);
    ductGlow.position.copy(tip).add(new T.Vector3(0, -0.04, 0));
    ductGlow.rotation.x = Math.PI / 2;
    rotorGroup.add(ductGlow);

    // spinning rotor assembly
    const pivot = new T.Group();
    pivot.position.copy(tip);
    const hub = new T.Mesh(new T.CylinderGeometry(0.1, 0.13, 0.14, 10), panel);
    pivot.add(hub);
    for (let b = 0; b < 3; b++) {
      const blade = new T.Mesh(new T.BoxGeometry(1.0, 0.02, 0.14), carbonDark);
      blade.position.set(0, 0.02, 0);
      blade.rotation.y = (b / 3) * Math.PI * 2;
      blade.geometry.translate(0.5, 0, 0);
      pivot.add(blade);
    }
    const blurMesh = new T.Mesh(new T.CircleGeometry(0.56, 40), blur.clone());
    blurMesh.rotation.x = -Math.PI / 2;
    blurMesh.position.y = 0.03;
    pivot.add(blurMesh);
    rotorGroup.add(pivot);
    rotors.push({ pivot, blurMesh, dir: idx % 2 === 0 ? 1 : -1 });

    if (idx === 0) {
      const a = new T.Object3D(); a.position.copy(tip).add(new T.Vector3(0.2, 0.35, 0.2));
      rotorGroup.add(a); anchors.rotors = a;
    }
  });

  // ---- BEE WINGS (two translucent pairs) -------------------------------
  const wings = mkPart('wings', new T.Vector3(0, 1.0, 0));
  const wingList = [];
  function makeWing(len, wid, mount, s, sweep, lift) {
    const pivot = new T.Group();
    pivot.position.set(mount[0], mount[1], mount[2] * s);
    const geo = new T.PlaneGeometry(len, wid, 1, 1);
    geo.translate(len / 2, 0, 0);
    const m = new T.Mesh(geo, wingMat);
    m.rotation.x = -Math.PI / 2;       // lie flat (membrane faces up)
    pivot.add(m);
    // mechanical carbon leading-edge spar + root hinge
    const spar = new T.Mesh(new T.CylinderGeometry(0.024, 0.012, len, 6), carbonDark);
    spar.rotation.z = Math.PI / 2; spar.position.set(len / 2, 0, wid * 0.4);
    pivot.add(spar);
    const hinge = new T.Mesh(new T.CylinderGeometry(0.055, 0.055, 0.13, 10), panel);
    hinge.rotation.x = Math.PI / 2; pivot.add(hinge);
    pivot.rotation.y = s * sweep;       // sweep back & outward
    pivot.rotation.x = s * lift;        // resting dihedral
    pivot.userData.base = { x: pivot.rotation.x, side: s };
    wings.add(pivot);
    wingList.push(pivot);
  }
  // forewings (large) + hindwings (smaller), per side — raised & swept back
  for (const s of [1, -1]) {
    makeWing(1.7, 0.6, [0.1, 0.95, 0.1], s, 2.5, 0.62);
    makeWing(1.15, 0.42, [-0.2, 0.86, 0.08], s, 2.78, 0.5);
  }
  const aw = new T.Object3D(); aw.position.set(-0.7, 1.5, 1.1); wings.add(aw); anchors.wings = aw;

  // ---- LANDING STRUTS --------------------------------------------------
  const legs = mkPart('gear', new T.Vector3(0, -2.0, 0));
  [[0.7, 0.6], [0.7, -0.6], [-0.7, 0.6], [-0.7, -0.6]].forEach(([x, z]) => {
    const leg = new T.Mesh(new T.CylinderGeometry(0.04, 0.025, 0.85, 6), carbonDark);
    leg.position.set(x, -0.55, z);
    leg.rotation.set(z * 0.35, 0, -x * 0.35);
    legs.add(leg);
    const foot = new T.Mesh(new T.SphereGeometry(0.05, 8, 6), panel);
    foot.position.set(x * 1.28, -0.92, z * 1.28);
    legs.add(foot);
  });

  // store base positions for explode
  Object.values(parts).forEach((p) => { p.userData.basePos = p.position.clone(); });

  // ---- public api ------------------------------------------------------
  function setExplode(t) {
    Object.values(parts).forEach((p) => {
      const base = p.userData.basePos;
      const off = p.userData.explodeOffset;
      p.position.set(base.x + off.x * t, base.y + off.y * t, base.z + off.z * t);
    });
  }
  function spinRotors(dt, throttle) {
    rotors.forEach((r) => {
      r.pivot.rotation.y += r.dir * dt * 26 * throttle;
      const targetOpacity = Math.min(0.34, throttle * 0.34);
      r.blurMesh.material.opacity += (targetOpacity - r.blurMesh.material.opacity) * 0.08;
    });
  }
  function flutterWings(t, amp) {
    wingList.forEach((w, i) => {
      const b = w.userData.base;
      const flap = Math.sin(t * 26 + i * 0.4) * amp;
      w.rotation.x = b.x + b.side * flap;
    });
  }

  root.scale.setScalar(0.85);
  return { group: root, parts, anchors, rotors, wings: wingList, setExplode, spinRotors, flutterWings };
}


// ===== vesper-viewer.js =====
// vesper-viewer.js — interactive 3D viewer for the VESPER micro-drone

const stage = document.getElementById('stage');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 200);
camera.position.set(4.6, 2.4, 5.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3.2;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.92;
controls.target.set(0, 0.2, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.9;

// ---- lighting -----------------------------------------------------------
scene.add(new THREE.HemisphereLight(0x9fd8ff, 0x05080c, 0.35));
const key = new THREE.DirectionalLight(0xffffff, 2.1);
key.position.set(5, 7, 4);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 30;
key.shadow.camera.left = -8; key.shadow.camera.right = 8;
key.shadow.camera.top = 8; key.shadow.camera.bottom = -8;
key.shadow.bias = -0.0004;
scene.add(key);
const rim = new THREE.DirectionalLight(0x22d3ee, 3.0);
rim.position.set(-6, 3, -5);
scene.add(rim);
const fill = new THREE.PointLight(0x3a6fff, 1.2, 30);
fill.position.set(3, -2, -4);
scene.add(fill);

// ---- ground + ambience --------------------------------------------------
const groundGeo = new THREE.CircleGeometry(40, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x05080c, metalness: 0.4, roughness: 0.85 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.55;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(40, 60, 0x123642, 0x0c2129);
grid.position.y = -1.54;
grid.material.transparent = true; grid.material.opacity = 0.35;
scene.add(grid);

// starfield
{
  const N = 900, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 45 + Math.random() * 40;
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(ph) * Math.cos(th);
    pos[i * 3 + 1] = Math.abs(r * Math.cos(ph)) * 0.6 + 2;
    pos[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0x6fd6e6, size: 0.18, transparent: true, opacity: 0.7 })));
}

// orbiting satellite ring (theme)
const orbit = new THREE.Group();
{
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(15, 0.02, 8, 140),
    new THREE.MeshBasicMaterial({ color: 0x1a5666, transparent: true, opacity: 0.35 })
  );
  ring.rotation.x = Math.PI / 2.3;
  orbit.add(ring);
  for (let i = 0; i < 4; i++) {
    const sat = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.07, 0.22),
      new THREE.MeshStandardMaterial({ color: 0x142028, emissive: 0x22d3ee, emissiveIntensity: 0.9, metalness: 0.6, roughness: 0.4 }));
    const a = (i / 4) * Math.PI * 2;
    sat.userData.a = a;
    orbit.add(sat);
  }
}
scene.add(orbit);

// ---- the drone ----------------------------------------------------------
const vesper = createVesper(THREE);
scene.add(vesper.group);

// scale-reference coin
const coin = new THREE.Group();
{
  const c = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.05, 48),
    new THREE.MeshStandardMaterial({ color: 0x8a8f96, metalness: 0.95, roughness: 0.35 }));
  c.rotation.x = -Math.PI / 2.05;
  c.position.set(2.7, -1.3, 1.2);
  c.castShadow = true;
  coin.add(c);
  coin.visible = false;
}
scene.add(coin);

// ---- hotspots -----------------------------------------------------------
const HOTSPOTS = [
  { key: 'vision360', n: '01', t: '360° vision sphere', d: 'Omnidirectional 8K capture — zero blind spots' },
  { key: 'thermal', n: '02', t: 'Thermal / heatmap imager', d: 'Radiometric IR — locks onto heat signatures' },
  { key: 'sensor', n: '03', t: 'Night-vision optics', d: 'Starlight-grade intensified compound eyes' },
  { key: 'acoustic', n: '04', t: 'Acoustic array', d: 'Directional audio — voice & gunshot ID' },
  { key: 'uplink', n: '05', t: 'SATCOM phased array', d: 'Direct-to-orbit Ku-band — no ground relay' },
  { key: 'rotors', n: '06', t: 'Ducted micro-rotors ×4', d: 'Tri-blade · 52 dB whisper profile' },
  { key: 'wings', n: '07', t: 'Wing phased-array radar', d: 'Conformal AESA membrane — S-500-class detect & track + silent glide' },
  { key: 'airframe', n: '08', t: 'Adaptive multi-spectral stealth', d: 'Electrochromic skin + IR cloak + RAM — invisible by day and night' },
];
const hotLayer = document.getElementById('hotspots');
HOTSPOTS.forEach((h) => {
  const el = document.createElement('div');
  el.className = 'hotspot';
  el.innerHTML = `<span class="hs-dot"></span><div class="hs-card"><span class="hs-n">${h.n}</span><div><div class="hs-t">${h.t}</div><div class="hs-d">${h.d}</div></div></div>`;
  h.el = el;
  hotLayer.appendChild(el);
});

// ---- state + controls ---------------------------------------------------
const state = { rotor: 0.0, rotorTarget: 0.85, explode: 0, explodeTarget: 0, hotspots: false, scale: false };

function bindToggle(id, on, fn) {
  const b = document.getElementById(id);
  let v = on;
  const sync = () => { b.classList.toggle('on', v); fn(v); };
  b.addEventListener('click', () => { v = !v; sync(); });
  sync();
  return { set: (nv) => { v = nv; sync(); } };
}

const tAuto = bindToggle('btn-auto', true, (v) => { controls.autoRotate = v; });
const tSpin = bindToggle('btn-spin', false, (v) => { state.rotorTarget = v ? 0.85 : 0.0; });
const tExpl = bindToggle('btn-explode', false, (v) => { state.explodeTarget = v ? 1 : 0; tag(v); });
const tHot = bindToggle('btn-hotspots', false, (v) => { state.hotspots = v; hotLayer.style.display = v ? 'block' : 'none'; });
const tScale = bindToggle('btn-scale', false, (v) => { state.scale = v; coin.visible = v; document.getElementById('scale-tag').classList.toggle('show', v); });

function tag(v) { document.getElementById('mode-tag').textContent = v ? 'EXPLODED VIEW' : 'ASSEMBLED'; }

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.set(4.6, 2.4, 5.6); controls.target.set(0, 0.2, 0);
});

// ---- loop ---------------------------------------------------------------
const tmp = new THREE.Vector3();
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  state.rotor += (state.rotorTarget - state.rotor) * 0.04;
  state.explode += (state.explodeTarget - state.explode) * 0.08;
  vesper.spinRotors(dt, state.rotor);
  vesper.flutterWings(t, 0.13 + state.rotor * 0.16);
  vesper.setExplode(state.explode);

  // idle hover bob (only when assembled)
  vesper.group.position.y = Math.sin(t * 1.1) * 0.06 * (1 - state.explode);
  vesper.group.rotation.z = Math.sin(t * 0.8) * 0.012 * (1 - state.explode);

  orbit.rotation.y = t * 0.12;
  orbit.children.forEach((s, i) => {
    if (s.userData.a === undefined) return;
    const a = s.userData.a + t * 0.5;
    s.position.set(Math.cos(a) * 15, Math.sin(a + 1) * 2.2 + 5, Math.sin(a) * 15 * Math.cos(Math.PI / 2.3));
  });

  controls.update();

  // hotspot projection
  if (state.hotspots) {
    HOTSPOTS.forEach((h) => {
      const anc = vesper.anchors[h.key];
      anc.getWorldPosition(tmp);
      const wp = tmp.clone();
      tmp.project(camera);
      const behind = tmp.z > 1;
      const x = (tmp.x * 0.5 + 0.5) * innerWidth;
      const y = (-tmp.y * 0.5 + 0.5) * innerHeight;
      // occlusion: hide if facing away from camera (dot of normal-ish)
      const toCam = camera.position.clone().sub(wp).normalize();
      const fromCenter = wp.clone().sub(vesper.group.position).normalize();
      const facing = toCam.dot(fromCenter) > -0.35;
      h.el.style.left = x + 'px';
      h.el.style.top = y + 'px';
      h.el.style.opacity = (behind || !facing) ? '0.12' : '1';
      h.el.style.pointerEvents = (behind || !facing) ? 'none' : 'auto';
    });
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// expose for quick scripted checks
window.__vesper = { state, camera, controls, tSpin, tExpl, tHot, tScale };
