name: IMAP Poll (every 10 min)

# Runs on a schedule. Vercel Hobby blocks sub-daily crons; GitHub Actions
# crons are free and have no sub-daily limit. This workflow pings the
# /api/mail/imap-poll endpoint every 10 minutes with the CRON_SECRET so
# inbound mail keeps flowing without paying for Vercel Pro.
#
# One-time setup (do this once on GitHub):
#   Repository → Settings → Secrets and variables → Actions → New repository secret
#     Name: CRON_SECRET    Value: <same value you set in Vercel env vars>
#     Name: SITE_ORIGIN    Value: https://edurankai.in
#
# If you ever want to pause it: comment out the schedule block below or
# disable the workflow from the GitHub Actions tab.

on:
  schedule:
    # GitHub Actions cron runs in UTC. Every 10 minutes — note that GitHub
    # may delay runs by a minute or two under load; the IMAP poll is idempotent
    # so a small jitter doesn't matter.
    - cron: '*/10 * * * *'
  workflow_dispatch:  # also allow manual trigger from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit IMAP poll endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_ORIGIN: ${{ secrets.SITE_ORIGIN }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$SITE_ORIGIN" ]; then
            echo "::error::CRON_SECRET and SITE_ORIGIN secrets must be set in repository settings."
            exit 1
          fi
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X GET "${SITE_ORIGIN}/api/mail/imap-poll" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 90)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "$BODY"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::IMAP poll returned non-200 status"
            exit 1
          fi
