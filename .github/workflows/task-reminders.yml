name: Task Deadline Reminders (hourly)

# Sends a "1 day left" and a "6 hours left" reminder to applicants who were
# sent a task, based on the standard 5-day deadline from task_sent_at. Runs
# hourly via GitHub Actions (free, no sub-daily limit) rather than Vercel's
# daily-only Hobby cron — a once-a-day run cannot land inside a moving 6-hour
# window for tasks issued at arbitrary times. Reuses the same CRON_SECRET /
# SITE_ORIGIN repo secrets already set up for imap-poll.yml.

on:
  schedule:
    - cron: '7 * * * *'   # 7 minutes past every hour (UTC), offset from imap-poll
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Hit task-reminders endpoint
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_ORIGIN: ${{ secrets.SITE_ORIGIN }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set."
            exit 1
          fi
          if [ -z "$SITE_ORIGIN" ]; then
            echo "::error::Repository secret SITE_ORIGIN is not set. Should be https://edurankai.in"
            exit 1
          fi

          echo "Hitting $SITE_ORIGIN/api/hiring/task-reminders ..."

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X GET "${SITE_ORIGIN}/api/hiring/task-reminders" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 60 || echo $'\nCURL_FAILED')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP_CODE=$HTTP_CODE"
          echo "BODY=$BODY"

          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Auth rejected. CRON_SECRET in this repo doesn't match Vercel's CRON_SECRET."
            exit 1
          fi
          if [ "$HTTP_CODE" = "CURL_FAILED" ] || [ "$HTTP_CODE" = "000" ]; then
            echo "::warning::Could not reach the endpoint. Will retry next hour."
            exit 0
          fi
          if [ "$HTTP_CODE" -ge 500 ] 2>/dev/null; then
            echo "::warning::Server returned $HTTP_CODE (likely cold-start). Will retry next hour."
            exit 0
          fi

          echo "Success."
